<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Ornamento floral dorado</title>
  <desc id="desc">Pequeño ornamento decorativo dorado de cuatro pétalos para una web de pastelería gourmet.</desc>
  <defs>
    <linearGradient id="gold-main" x1="12" y1="10" x2="52" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2D9AA"/>
      <stop offset="0.35" stop-color="#C99A5A"/>
      <stop offset="0.7" stop-color="#9F6F3D"/>
      <stop offset="1" stop-color="#E8C78E"/>
    </linearGradient>
    <linearGradient id="gold-soft" x1="18" y1="18" x2="46" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF0CF"/>
      <stop offset="0.5" stop-color="#D4A461"/>
      <stop offset="1" stop-color="#8F5F35"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="32" cy="32" r="12" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE9BC"/>
      <stop offset="0.52" stop-color="#C5904F"/>
      <stop offset="1" stop-color="#7D4F2D"/>
    </radialGradient>
  </defs>

  <!-- Horizontal petals -->
  <path d="M7 32C14.8 24.8 23.3 21.3 32 32C23.3 42.7 14.8 39.2 7 32Z" fill="url(#gold-main)" opacity="0.96"/>
  <path d="M57 32C49.2 24.8 40.7 21.3 32 32C40.7 42.7 49.2 39.2 57 32Z" fill="url(#gold-main)" opacity="0.96"/>

  <!-- Vertical petals -->
  <path d="M32 7C39.2 14.8 42.7 23.3 32 32C21.3 23.3 24.8 14.8 32 7Z" fill="url(#gold-soft)" opacity="0.98"/>
  <path d="M32 57C24.8 49.2 21.3 40.7 32 32C42.7 40.7 39.2 49.2 32 57Z" fill="url(#gold-soft)" opacity="0.98"/>

  <!-- Small inner facets -->
  <path d="M21.5 32L32 21.5L42.5 32L32 42.5Z" fill="url(#center-glow)" opacity="0.82"/>
  <path d="M32 14.5L36.2 27.8L32 32L27.8 27.8Z" fill="#A8733F" opacity="0.34"/>
  <path d="M49.5 32L36.2 36.2L32 32L36.2 27.8Z" fill="#FFF1D2" opacity="0.3"/>
  <path d="M32 49.5L27.8 36.2L32 32L36.2 36.2Z" fill="#704627" opacity="0.2"/>
  <path d="M14.5 32L27.8 27.8L32 32L27.8 36.2Z" fill="#FFF1D2" opacity="0.24"/>

  <!-- Center -->
  <circle cx="32" cy="32" r="4.3" fill="#F4D49A"/>
  <circle cx="32" cy="32" r="2.25" fill="#9A6338" opacity="0.72"/>
</svg>
