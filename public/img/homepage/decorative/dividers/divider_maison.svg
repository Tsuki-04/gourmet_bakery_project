      <stop offset="0" stop-color="#d6a44c" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#d6a44c" stop-opacity="0.85"/>
      <stop offset="0.50" stop-color="#d6a44c" stop-opacity="1"/>
